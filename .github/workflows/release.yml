name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish single-file EXE
        run: |
          dotnet publish ARA.csproj -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Sign EXE
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:CERT_PFX_BASE64)
          [IO.File]::WriteAllBytes("cert.pfx", $bytes)
          signtool sign /f cert.pfx /p $env:CERT_PASSWORD `
            /t http://timestamp.digicert.com /fd SHA256 `
            ./publish/ARA.exe
          Remove-Item cert.pfx


      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./publish/ARA.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false